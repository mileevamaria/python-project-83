{% extends "base.html" %}

{% block title %}Анализатор страниц{% endblock %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-7">
    <div class="h-100 p-5 bg-body-tertiary border rounded-3">
      <p class="display-5">Анализатор страниц</p> 
      <p>Бесплатно проверяйте сайты на SEO-пригодность</p>
      <form class="d-flex" action="{{ url_for('urls') }}" method="post">    
        <input class="form-control me-2" type="text" name="url" placeholder="https://example.com">
        <button class="btn btn-primary" type="submit">ПРОВЕРИТЬ</button>
      </form>
    </div>
  </div>
</div>

{% endblock %}
