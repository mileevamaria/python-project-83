{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for message in messages %}
            <div class="alert {% if message.0 == 'error' %}alert-danger{% else %}alert-success{% endif %} alert-dismissible fade show" style="width: 60%; margin: 10px auto;" role="alert">
                {{ message.1 }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}
