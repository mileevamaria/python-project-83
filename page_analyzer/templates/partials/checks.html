<div style="width: 60%; margin: 40px auto;">
    <p class="display-6">Проверки</p> 
    <div style="margin: 20px 0px;">
        <form method="post" action="{{ url_for('check_url', id=url.id ) }}">
            <input class="btn btn-primary" type="submit" value="Запустить проверку">
        </form>
    </div>
    <table class="table table-sm table-bordered" data-test="checks">
        <thead>
            <tr>
                <th scope="col">ID</th>
                <th scope="col">Код ответа</th>
                <th scope="col">h1</th>
                <th scope="col">title</th>
                <th scope="col">description</th>
                <th scope="col">Дата создания</th>
            </tr>
        </thead>
        <tbody>
            {% for check in url.checks %}
            <tr>
                <td>{{ check.id }}</td>
                <td>{{ check.status_code |default('', True) }}</td>
                <td>{{ check.h1 |default('', True) }}</td>
                <td>{{ check.title |default('', True) }}</td>
                <td>{{ check.description |default('', True) }}</td>
                <td>{{ check.checked_at }}</td>
            <tr>
            {% endfor %}
        </tbody>
    </table>
</div>
