{% extends "base.html" %}

{% block title %}Сайты{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-10 col-lg-10">
    <p class="display-6">Сайт: {{ url.name }}</p> 
    <table class="table table-sm table-bordered" data-test="url">
      <tbody>
        <tr>
          <th scope="row">ID</th>
          <td>{{ url.id }}</td>
        </tr>
        <tr>
          <th scope="row">Имя</th>
          <td>{{ url.name }}</td>
        </tr>
        <tr>
          <th scope="row">Дата создания</th>
          <td>{{ url.created_at }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

{% include "checks.html" %}
{% endblock %}
