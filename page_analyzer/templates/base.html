<!DOCTYPE html>
<html lang="en" class="h-100">
  <head>
      <meta charset="UTF-8">
      <title>{% block title %}Анализатор страниц{% endblock %}</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="d-flex flex-column min-vh-100">

    <!-- header -->
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">
        <a class="navbar-brand mb-0 h1" href="{{ url_for('main') }}">Анализатор страниц</a>
        <a href="{{ url_for('urls') }}" class="nav-link text-secondary">Сайты</a>
        </div>
      </div>
    </nav>

    <!-- flash -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="container-fluid mt-3">
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}" role="alert">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <!-- main block -->
    <main class="flex-shrink-0"> 
      <div class="container mt-5">
          {% block content %}{% endblock %}
      </div>
    </main>

    <!-- footer -->
    <footer class="border-top mt-auto py-3 text-center">
      <a href="https://hexlet.io" target="_blank">Hexlet</a>
    </footer>

  </body>
</html>
